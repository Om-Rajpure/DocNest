# =============================================
# DocNest - Production Configuration
# =============================================

# Server
server.port=${PORT:8080}

# =============================================
# Database
# =============================================
# Production values provided via environment variables in Render/Aiven
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# =============================================
# JWT Authentication
# =============================================
# Mapping to uppercase environment variables for Render compatibility
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =============================================
# CORS Configuration
# =============================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:5174}

# =============================================
# File Storage
# =============================================
file.upload-dir=${UPLOAD_DIR:uploads}

# =============================================
# Application Name
# =============================================
spring.application.name=DocNest

# =============================================
# Multipart Configuration
# =============================================
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB
